name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Download checksum files
          curl -sL "https://github.com/victorstein/tawtui/releases/download/${TAG}/tawtui-darwin-arm64.sha256" -o checksum.txt
          SHA256=$(awk '{print $1}' checksum.txt)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

          curl -sL "https://github.com/victorstein/tawtui/releases/download/${TAG}/tawtui-notify-darwin-arm64.tar.gz.sha256" -o notify-checksum.txt
          NOTIFY_SHA256=$(awk '{print $1}' notify-checksum.txt)
          echo "notify_sha256=$NOTIFY_SHA256" >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA256: ${{ steps.release.outputs.sha256 }}
          NOTIFY_SHA256: ${{ steps.release.outputs.notify_sha256 }}
        run: |
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/tawtui.rb
          # Update main binary sha256 (first occurrence after url line)
          sed -i "0,/sha256 \".*\"/{s/sha256 \".*\"/sha256 \"${SHA256}\"/}" Formula/tawtui.rb
          # Update notify helper sha256 (the PLACEHOLDER or second sha256 in resource block)
          sed -i "/resource \"notify-helper\"/,/end/{s/sha256 \".*\"/sha256 \"${NOTIFY_SHA256}\"/}" Formula/tawtui.rb

      - name: Commit and push
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tawtui.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update tawtui to ${VERSION}"
          git push

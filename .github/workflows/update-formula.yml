name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Download checksums
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          gh release download "$TAG" \
            --repo victorstein/tawtui \
            --pattern "*.sha256" \
            --dir checksums

          SHA256=$(awk '{print $1}' checksums/tawtui-darwin-arm64.sha256)
          NOTIFY_SHA256=$(awk '{print $1}' checksums/tawtui-notify-darwin-arm64.tar.gz.sha256)

          # Validate both are 64-char hex strings
          for name in SHA256 NOTIFY_SHA256; do
            val="${!name}"
            if [[ ! "$val" =~ ^[a-f0-9]{64}$ ]]; then
              echo "::error::Invalid checksum for $name: '$val'"
              exit 1
            fi
          done

          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "notify_sha256=$NOTIFY_SHA256" >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA256: ${{ steps.release.outputs.sha256 }}
          NOTIFY_SHA256: ${{ steps.release.outputs.notify_sha256 }}
        run: |
          ruby -e '
            f = File.read("Formula/tawtui.rb")
            f.sub!(/version ".*?"/, "version \"#{ENV["VERSION"]}\"")
            f.sub!(/\A(.*?)(sha256 ".*?")/m) { $1 + "sha256 \"#{ENV["SHA256"]}\"" }
            f.sub!(/(resource "notify-helper".*?)(sha256 ".*?")/m) { $1 + "sha256 \"#{ENV["NOTIFY_SHA256"]}\"" }
            File.write("Formula/tawtui.rb", f)
          '

      - name: Verify formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA256: ${{ steps.release.outputs.sha256 }}
          NOTIFY_SHA256: ${{ steps.release.outputs.notify_sha256 }}
        run: |
          formula=$(cat Formula/tawtui.rb)
          errors=0
          grep -q "version \"$VERSION\"" <<< "$formula" || { echo "::error::Version not updated"; errors=1; }
          grep -q "sha256 \"$SHA256\"" <<< "$formula" || { echo "::error::Binary SHA not updated"; errors=1; }
          grep -q "sha256 \"$NOTIFY_SHA256\"" <<< "$formula" || { echo "::error::Notify SHA not updated"; errors=1; }
          exit $errors

      - name: Commit and push
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tawtui.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update tawtui to ${VERSION}"
          git push
